<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Flappy Bird - Ruxxi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #0a2f3a 0%, #0a1f2a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', 'Fira Code', monospace;
            touch-action: manipulation;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 20px;
            border-radius: 48px;
            background: rgba(0,0,0,0.3);
            box-shadow: 0 25px 40px rgba(0,0,0,0.4);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.5), inset 0 0 2px rgba(255,255,255,0.3);
            cursor: pointer;
            background-color: #4f9f9f;
        }

        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 2rem;
            background: #1e2f2cde;
            backdrop-filter: blur(4px);
            padding: 10px 28px;
            border-radius: 60px;
            font-weight: bold;
            color: #f7f3c6;
            text-shadow: 2px 2px 0 #1f4e3f;
            letter-spacing: 1px;
        }

        .score-box, .best-box {
            font-size: 1.8rem;
            background: #010f1a;
            padding: 4px 16px;
            border-radius: 32px;
            font-family: monospace;
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .score-box span:first-child, .best-box span:first-child {
            font-size: 1rem;
            font-weight: bold;
            color: #cbdfbd;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        button {
            background: #fedba0;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: monospace;
            padding: 6px 22px;
            border-radius: 80px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 5px 0 #8b6b3c;
            color: #2c2b26;
        }

        button:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0 #8b6b3c;
        }

        .status {
            font-size: 1.2rem;
            background: #00000099;
            padding: 5px 18px;
            border-radius: 60px;
            backdrop-filter: blur(2px);
        }

        @media (max-width: 550px) {
            .info-panel {
                gap: 1rem;
                padding: 6px 20px;
            }
            .score-box, .best-box {
                font-size: 1.4rem;
                padding: 2px 12px;
            }
            button {
                padding: 4px 18px;
                font-size: 1rem;
            }
        }
        
        .credit {
            font-size: 0.8rem;
            color: #c7e0cf;
            background: #05161e70;
            padding: 4px 18px;
            border-radius: 30px;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div>
    <div class="game-container">
        <canvas id="flappyCanvas" width="400" height="600"></canvas>
        <div class="info-panel">
            <div class="score-box"><span>🏆 SCORE</span> <span id="currentScore">0</span></div>
            <div class="best-box"><span>⭐ BEST</span> <span id="bestScore">0</span></div>
            <div class="action-buttons">
                <button id="restartBtn">🔄 RESTART</button>
            </div>
        </div>
        <div class="status" id="gameStatusText">✨ TEKAN SPACE / KLIK KANVAS ✨</div>
        <div class="credit">✧ created by Ruxxi | flappy spirit ✧</div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('flappyCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- GAME DIMENSIONS ----------
        const W = 400, H = 600;
        
        // ---------- GAME PARAMS ----------
        const GRAVITY = 0.2;
        const JUMP_FORCE = -4.8;
        const PIPE_WIDTH = 60;
        const PIPE_GAP = 140;
        const PIPE_SPACING = 240;    // jarak antar pasangan pipa
        const PIPE_SPEED = 2.2;
        
        // ---------- BIRD ----------
        const BIRD_RADIUS = 14;
        let bird = {
            x: W * 0.3,
            y: H/2,
            vy: 0,
            rotation: 0
        };
        
        // ---------- PIPES ----------
        let pipes = [];
        
        // skor & best
        let score = 0;
        let bestScore = localStorage.getItem('flappyBestRuxxi') ? parseInt(localStorage.getItem('flappyBestRuxxi')) : 0;
        document.getElementById('bestScore').innerText = bestScore;
        
        let gameRunning = true;
        let animationId = null;
        
        // efek partikel / debu (opsional estetika)
        let particles = [];
        
        // ---------- HELPER: UPDATE UI ----------
        function updateScoreUI(){
            document.getElementById('currentScore').innerText = score;
            if(score > bestScore){
                bestScore = score;
                localStorage.setItem('flappyBestRuxxi', bestScore);
                document.getElementById('bestScore').innerText = bestScore;
            }
        }
        
        // ---------- RESET GAME ----------
        function resetGame(){
            gameRunning = true;
            score = 0;
            updateScoreUI();
            bird.y = H/2;
            bird.vy = 0;
            bird.rotation = 0;
            // kosongkan pipes & buat ulang
            pipes = [];
            generateInitialPipes();
            particles = [];
            document.getElementById('gameStatusText').innerHTML = "🐦 TERBANG! TEKAN LAGI UNTUK LONCAT 🐦";
            document.getElementById('gameStatusText').style.color = "#e9ffc2";
            // jika animasi belum jalan, mulai ulang
            if(animationId === null){
                startGameLoop();
            }
        }
        
        // generate pipe pertama & kedua biar seamless
        function generateInitialPipes(){
            // buat 3 pasang pipa agar tampilan awal penuh
            for(let i = 0; i < 3; i++){
                let pipeX = W + i * PIPE_SPACING;
                let gapY = getRandomGapY();
                pipes.push({
                    x: pipeX,
                    gapY: gapY,
                    counted: false
                });
            }
        }
        
        // posisi celah random (batas aman)
        function getRandomGapY(){
            const minGap = 70;
            const maxGap = H - PIPE_GAP - 70;
            return Math.floor(Math.random() * (maxGap - minGap + 1) + minGap);
        }
        
        // menambahkan pipe baru di ujung kanan
        function addPipe(){
            pipes.push({
                x: W,
                gapY: getRandomGapY(),
                counted: false
            });
        }
        
        // ----- KOLISI DETEKSI (lingkaran burung vs pipa persegi panjang) -----
        function checkCollision(){
            // batas atas / bawah
            if(bird.y - BIRD_RADIUS <= 0 || bird.y + BIRD_RADIUS >= H){
                return true;
            }
            
            for(let pipe of pipes){
                // pipe atas: persegi panjang dari y=0 sampai gapY
                // pipe bawah: dari gapY + PIPE_GAP sampai H
                const pipeRight = pipe.x + PIPE_WIDTH;
                const pipeLeft = pipe.x;
                if(bird.x + BIRD_RADIUS > pipeLeft && bird.x - BIRD_RADIUS < pipeRight){
                    // tabrakan dengan pipa atas
                    if(bird.y - BIRD_RADIUS <= pipe.gapY){
                        return true;
                    }
                    // tabrakan dengan pipa bawah
                    if(bird.y + BIRD_RADIUS >= pipe.gapY + PIPE_GAP){
                        return true;
                    }
                }
            }
            return false;
        }
        
        // update logika: gerak burung, pipa, skor
        function updateGame(){
            if(!gameRunning) return;
            
            // 1. bird physics
            bird.vy += GRAVITY;
            bird.y += bird.vy;
            
            // rotasi berdasarkan kecepatan vertikal (estetika)
            bird.rotation = Math.min(Math.max(bird.vy * 2.5, -40), 70);
            
            // 2. update pipes position
            for(let i=0; i<pipes.length; i++){
                pipes[i].x -= PIPE_SPEED;
            }
            // hapus pipe yang sudah keluar layar (x + lebar < 0)
            pipes = pipes.filter(pipe => pipe.x + PIPE_WIDTH > 0);
            
            // 3. tambah pipe baru jika perlu
            if(pipes.length === 0){
                addPipe();
            } else {
                let lastPipe = pipes[pipes.length-1];
                if(lastPipe.x + PIPE_WIDTH <= W - PIPE_SPACING){
                    addPipe();
                }
            }
            
            // 4. penambahan skor (ketika burung melewati pipa)
            for(let pipe of pipes){
                if(!pipe.counted && pipe.x + PIPE_WIDTH < bird.x - BIRD_RADIUS){
                    pipe.counted = true;
                    score++;
                    updateScoreUI();
                    // tambahkan partikel kesenangan
                    addScoreParticles(bird.x, bird.y);
                }
            }
            
            // 5. cek kolisi setelah update posisi
            if(checkCollision()){
                gameRunning = false;
                document.getElementById('gameStatusText').innerHTML = "💀 GAME OVER 💀  Tekan RESTART";
                document.getElementById('gameStatusText').style.color = "#ffbc7c";
                return;
            }
            
            // tambahkan partikel latar belakang tipis (hanya untuk suasana)
            if(Math.random() < 0.2){
                particles.push({
                    x: Math.random() * W,
                    y: H,
                    size: Math.random() * 2 + 1,
                    alpha: 0.5,
                    vy: -Math.random() * 1.2 - 0.5
                });
            }
            // update partikel debu
            for(let i=0; i<particles.length; i++){
                particles[i].y += particles[i].vy;
                particles[i].alpha -= 0.008;
                if(particles[i].y < 0 || particles[i].alpha <= 0){
                    particles.splice(i,1);
                    i--;
                }
            }
        }
        
        // efek visual partikel saat dapat skor
        function addScoreParticles(x, y){
            for(let i=0;i<8;i++){
                particles.push({
                    x: x + (Math.random() - 0.5)*20,
                    y: y + (Math.random() - 0.5)*20,
                    size: Math.random()*4+2,
                    alpha: 0.9,
                    vy: Math.random() * -2.5 - 1,
                    vx: (Math.random() - 0.5)*2,
                    life: 1,
                    special: true
                });
            }
        }
        
        // ---------- RENDER SEMUA GRAFIK (dengan gaya flappy khas) ----------
        function draw(){
            ctx.clearRect(0,0,W,H);
            
            // ---- langit gradien ----
            const gradSky = ctx.createLinearGradient(0,0,0,H);
            gradSky.addColorStop(0,"#62c7c1");
            gradSky.addColorStop(0.7,"#3490a0");
            ctx.fillStyle = gradSky;
            ctx.fillRect(0,0,W,H);
            
            // ---- awan sederhana ----
            ctx.fillStyle = "rgba(255,250,210,0.7)";
            ctx.beginPath();
            ctx.ellipse(70, 80, 40, 30, 0, 0, Math.PI*2);
            ctx.ellipse(110, 70, 45, 35, 0, 0, Math.PI*2);
            ctx.ellipse(140, 90, 35, 28, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(280, 140, 55, 40, 0, 0, Math.PI*2);
            ctx.ellipse(330, 120, 48, 38, 0, 0, Math.PI*2);
            ctx.fill();
            
            // ---- PIPA (green tube style) ----
            for(let pipe of pipes){
                // Pipa atas (dengan highlight)
                ctx.fillStyle = "#2b6e3c";
                ctx.shadowBlur = 0;
                ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.gapY);
                ctx.fillStyle = "#1f5430";
                ctx.fillRect(pipe.x, pipe.gapY-28, PIPE_WIDTH, 28);
                // tutup pipa atas
                ctx.fillStyle = "#5c8f4c";
                ctx.fillRect(pipe.x-6, pipe.gapY-28, PIPE_WIDTH+12, 18);
                // detail
                ctx.fillStyle = "#e5d97a";
                ctx.fillRect(pipe.x+8, pipe.gapY-20, 8, 12);
                ctx.fillRect(pipe.x+PIPE_WIDTH-16, pipe.gapY-20, 8, 12);
                
                // Pipa bawah
                const bottomY = pipe.gapY + PIPE_GAP;
                ctx.fillStyle = "#2b6e3c";
                ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, H - bottomY);
                ctx.fillStyle = "#1f5430";
                ctx.fillRect(pipe.x, bottomY, PIPE_WIDTH, 28);
                ctx.fillStyle = "#5c8f4c";
                ctx.fillRect(pipe.x-6, bottomY, PIPE_WIDTH+12, 18);
                ctx.fillStyle = "#e5d97a";
                ctx.fillRect(pipe.x+8, bottomY+8, 8, 12);
                ctx.fillRect(pipe.x+PIPE_WIDTH-16, bottomY+8, 8, 12);
            }
            
            // ---- partikel efek (score dan background) ----
            for(let p of particles){
                ctx.save();
                ctx.globalAlpha = Math.min(p.alpha, 0.8);
                ctx.fillStyle = p.special ? "#FFD966" : "#f9e7b3";
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fill();
                if(p.special && p.vx){
                    ctx.fillStyle = "#ffb347";
                    ctx.beginPath();
                    ctx.arc(p.x-2, p.y-1, p.size*0.6, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
            }
            
            // ---- BURUNG (gaya kartun dengan sayap animasi berdasarkan waktu) ----
            ctx.save();
            ctx.translate(bird.x, bird.y);
            let rotRad = bird.rotation * Math.PI/180;
            ctx.rotate(rotRad);
            // badan burung
            ctx.beginPath();
            ctx.ellipse(0, 0, BIRD_RADIUS, BIRD_RADIUS*0.9, 0, 0, Math.PI*2);
            ctx.fillStyle = "#F7D44A";
            ctx.fill();
            ctx.fillStyle = "#E09D32";
            ctx.beginPath();
            ctx.ellipse(2, -3, 3, 4, 0, 0, Math.PI*2);
            ctx.fill(); // mata outline
            ctx.fillStyle = "#0F0F1C";
            ctx.beginPath();
            ctx.arc(4, -3, 2, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.beginPath();
            ctx.arc(5, -4, 0.8, 0, Math.PI*2);
            ctx.fill();
            // paruh
            ctx.beginPath();
            ctx.moveTo(8, -2);
            ctx.lineTo(14, -1);
            ctx.lineTo(8, 0);
            ctx.fillStyle = "#E25822";
            ctx.fill();
            // jambul
            ctx.fillStyle = "#CF7B1B";
            ctx.beginPath();
            ctx.moveTo(-6, -10);
            ctx.lineTo(-2, -13);
            ctx.lineTo(0, -9);
            ctx.fill();
            
            // sayap dengan gerakan (simulasi kepakan)
            let wingAngle = (Date.now() * 0.012) % (Math.PI*2);
            let wingOffset = Math.sin(wingAngle) * 0.6 + 0.3;
            ctx.beginPath();
            ctx.moveTo(-4, 0);
            ctx.quadraticCurveTo(-12, -6 + wingOffset*4, -15, 2 + wingOffset*2);
            ctx.lineTo(-7, 3);
            ctx.fillStyle = "#DEA139";
            ctx.fill();
            ctx.restore();
            
            // ---- tanah sederhana ----
            ctx.fillStyle = "#6c5436";
            ctx.fillRect(0, H-38, W, 38);
            ctx.fillStyle = "#b87c4f";
            for(let i=0;i<12;i++){
                ctx.fillRect(i*35, H-42, 18, 8);
            }
            ctx.fillStyle = "#496e2e";
            ctx.fillRect(0, H-42, W, 5);
            
            // ---- tulisan skor di dalam canvas (opsional) ----
            ctx.font = "bold 28px 'Courier New', monospace";
            ctx.shadowBlur = 0;
            ctx.fillStyle = "#FFF9E8";
            ctx.shadowColor = "#00000080";
            ctx.fillText(`${score}`, W-55, 60);
            ctx.font = "12px monospace";
            ctx.fillStyle = "#ffffbb";
            ctx.fillText("FLAPPY", W-90, 42);
            ctx.shadowColor = "transparent";
            
            // jika game over, tampilkan overlay pesan
            if(!gameRunning){
                ctx.font = "bold 20px monospace";
                ctx.fillStyle = "#311d0c";
                ctx.shadowBlur = 0;
                ctx.fillRect(60, H/2-50, W-120, 70);
                ctx.fillStyle = "#fff3bf";
                ctx.fillRect(62, H/2-48, W-124, 66);
                ctx.fillStyle = "#4a2611";
                ctx.font = "bold 24 monospace";
                ctx.fillText("GAME OVER", W/2-85, H/2-10);
                ctx.font = "12px monospace";
                ctx.fillStyle = "#2f401b";
                ctx.fillText("↺ tekan RESTART", W/2-70, H/2+28);
            }
            
            // efek bayangan halus burung
        }
        
        // ---------- GAME LOOP ----------
        function gameLoop(){
            updateGame();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }
        
        function startGameLoop(){
            if(animationId === null){
                animationId = requestAnimationFrame(gameLoop);
            }
        }
        
        // ---------- BIRD JUMP ----------
        function jump(){
            if(!gameRunning) return;
            bird.vy = JUMP_FORCE;
            // efek suara visual: partikel loncatan
            for(let i=0;i<6;i++){
                particles.push({
                    x: bird.x - 6,
                    y: bird.y + 8,
                    size: Math.random()*3+1,
                    alpha: 0.7,
                    vy: Math.random()*1.5,
                    vx: (Math.random()-0.5)*1.8
                });
            }
            // sedikit efek "whoosh" (hanya visual)
        }
        
        // ---------- EVENT HANDLERS (mouse, touch, keyboard) ----------
        function handleJump(e){
            // mencegah scroll pada spasi / klik
            if(e.type === 'keydown'){
                if(e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW'){
                    e.preventDefault();
                    jump();
                }
                // R restart cepat
                if(e.code === 'KeyR'){
                    e.preventDefault();
                    resetGame();
                }
            } else {
                // click / tap
                e.preventDefault();
                jump();
            }
        }
        
        // pasang event listener
        window.addEventListener('keydown', handleJump);
        canvas.addEventListener('click', (e) => {
            e.preventDefault();
            jump();
        });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            resetGame();
        });
        
        // inisialisasi pipes dan mulai game
        function init(){
            resetGame();  // ini akan generate pipes dan set gameRunning = true
            startGameLoop();
        }
        
        init();
        
        // bersihkan saat refresh (tidak perlu, tapi biarkan animasi tetap jalan)
        window.addEventListener('beforeunload', ()=>{
            if(animationId) cancelAnimationFrame(animationId);
        });
    })();
</script>
</body>
</html>
